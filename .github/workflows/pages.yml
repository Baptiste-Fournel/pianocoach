name: Deploy demo to GitHub Pages

# Builds a FRONTEND-ONLY static demo (VITE_DEMO=true): in-memory mock data,
# read-only. The AI coach and video analysis need the local backend (see README).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build demo (mock data, repo-subpath base)
        run: npm run build
        env:
          VITE_DEMO: "true"
          VITE_BASE: "/pianocoach/"
      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
